version: "3.9"

# ── Variáveis de ambiente configuráveis ───────────────────────────────────────
# EXPERIMENT_DIR      : subdiretório em generated/experiments/   (default: jdk21-pilot)
# RUN_STAMP           : timestamp do run atual
# SCENARIO            : wit_context | direct_tests | baseline
# METHOD_COUNT        : número máximo de métodos (0 = todos)
# WIT_OUTPUT_NAME     : nome da pasta de output do WIT               (default: jdk21-pilot)
# RUNTIME_CONFIG_FILE : arquivo de config runtime                    (default: jdk21-pilot.runtime.json)
# GENERATION_MODEL    : chave do modelo no runtime config            (default: gpt-4.1-nano)
# OPENAI_API_KEY      : chave da API OpenAI
#
# Reprodutibilidade:
#   Scripts, código e binário witup vêm do repositório público em WITUP_REPO/WITUP_COMMIT.
#   Apenas ./generated/ (configs do experimento e resultados) é montado do host.
#   JDK da75f3c4 está integrado à imagem — não requer checkout local.

x-common-env: &common-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  EXPERIMENT_DIR: ${EXPERIMENT_DIR:-jdk21-pilot}
  RUN_STAMP: ${RUN_STAMP:-}
  SCENARIO: ${SCENARIO:-baseline}
  METHOD_COUNT: ${METHOD_COUNT:-20}
  WIT_OUTPUT_NAME: ${WIT_OUTPUT_NAME:-jdk21-pilot}
  RUNTIME_CONFIG_FILE: ${RUNTIME_CONFIG_FILE:-jdk21-pilot.runtime.json}
  GENERATION_MODEL: ${GENERATION_MODEL:-openai_main}

# Apenas generated/ é montado do host — scripts e binário vêm da imagem.
x-common-volumes: &common-volumes
  - ./generated:/data/generated

services:

  # ── Constrói JDK 11+28 (da75f3c4) a partir do fonte ──────────────────────────
  # OBRIGATÓRIO: mesma versão usada na análise WIT do Diego.
  jdk-builder:
    build:
      context: .
      dockerfile: docker/jdk-builder/Dockerfile
      args:
        OPENJDK_COMMIT: ${OPENJDK_COMMIT:-da75f3c4}
    image: witup-llm/jdk-builder:latest
    command: java -version

  # ── Avaliador: jtreg + JCov + WIT + witup ───────────────────────────────────
  # Scripts e binário witup vêm do repositório público (WITUP_REPO/WITUP_COMMIT).
  # resources/ (JCov, WIT jar) são copiados do build context — publicar como
  # GitHub Release assets para reprodutibilidade total (ver TODO no Dockerfile).
  evaluator:
    build:
      context: .
      dockerfile: docker/evaluator/Dockerfile
      args:
        WITUP_REPO: ${WITUP_REPO:-https://github.com/marcelomamorim/wit-llm}
        WITUP_COMMIT: ${WITUP_COMMIT:-main}
    image: witup-llm/evaluator:latest
    command: java -version

  # ── WIT piloto: analisa java.lang com -Xmx5g ────────────────────────────────
  wit-pilot:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
      WIT_SCOPE: ${WIT_SCOPE:-src/java.base/share/classes}
      WIT_OUTPUT_NAME: ${WIT_OUTPUT_NAME:-jdk21-pilot}
      WIT_MAX_MEMORY: ${WIT_MAX_MEMORY:-5g}
    volumes: *common-volumes
    working_dir: /data
    command: bash /data/scripts/run-wit-pilot-docker.sh

  # ── Pós-processamento WIT (do-post-filter.py) ────────────────────────────────
  wit-post-process:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /data
    command: bash /data/scripts/run-wit-post-process-docker.sh

  # ── Preparação: gera JSONL de requisições para batch LLM ────────────────────
  prepare:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /data
    command: bash /data/scripts/run-prepare-docker.sh

  # ── jtreg: executa testes gerados nas variantes (direct-tests + wit-context) ──
  # Não re-materializa — usa variants/ já criados pelo serviço evaluate.
  # RUN_BASELINE=sim para incluir baseline tier1+tier2 (lento, ~horas).
  run-jtreg:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
      RUN_BASELINE: ${RUN_BASELINE:-nao}
      JTREG_CONCURRENCY: ${JTREG_CONCURRENCY:-4}
      JTREG_TIMEOUT_FACTOR: ${JTREG_TIMEOUT_FACTOR:-1}
    volumes: *common-volumes
    working_dir: /data
    command: bash /data/scripts/run-jtreg-docker.sh

  # ── Avaliação: materializa testes gerados e coleta métricas ──────────────────
  evaluate:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
    volumes: *common-volumes
    working_dir: /data
    command: bash /data/scripts/run-evaluate-docker.sh

  # ── Pipeline noturno completo: jtreg → JCov → test smells ────────────────────
  # JDK OBRIGATÓRIA: da75f3c4 (JDK 11+28) via TEST_JDK=/opt/test-jdk na imagem
  # O script aborta se TEST_JDK não for JDK 11.
  overnight:
    image: witup-llm/evaluator:latest
    environment:
      <<: *common-env
      EXPERIMENT_DIR: ${EXPERIMENT_DIR:-jdk-global-impact-study}
      RUN_STAMP: ${RUN_STAMP:-}
      JTREG_CONCURRENCY: ${JTREG_CONCURRENCY:-4}
      JTREG_TIMEOUT_FACTOR: ${JTREG_TIMEOUT_FACTOR:-2}
      SKIP_JTREG: ${SKIP_JTREG:-nao}
      SKIP_JCOV: ${SKIP_JCOV:-nao}
      SKIP_SMELLS: ${SKIP_SMELLS:-nao}
      JCOV_VARIANT: ${JCOV_VARIANT:-}
    volumes:
      - ./generated:/data/generated
      - ./scripts:/data/scripts
    working_dir: /data
    command: bash /data/scripts/run-overnight-pipeline.sh

  # ── Baseline JCov: mede cobertura de branch do tier1+tier2 existente ─────────
  # JDK OBRIGATÓRIA: da75f3c4 (JDK 11+28) — mesma versão do artigo WIT.
  # Saída: generated/experiments/${EXPERIMENT_DIR}/${RUN_STAMP}/jcov-baseline/
  jcov-baseline:
    image: witup-llm/evaluator:latest
    environment:
      EXPERIMENT_DIR: ${EXPERIMENT_DIR:-jdk-global-impact-study}
      RUN_STAMP: ${RUN_STAMP:-}
    volumes:
      - ./generated:/data/generated
      - ./scripts:/data/scripts
    working_dir: /data
    command: bash /data/scripts/run-jcov-baseline-docker.sh

  # ── article-evaluator: avaliação completa do experimento de artigo ────────────
  # Pipeline em duas etapas:
  #
  #   Etapa 1 — Setup (uma vez por máquina, ~30-60 min):
  #     docker compose run --rm article-setup
  #     Clona 7 projetos Java, pré-aquece Maven, gera baselines WIT.
  #     Persiste tudo em ./generated/ para reuso.
  #
  #   Etapa 2 — Avaliação (com o JSONL de respostas do batch):
  #     RESPONSES_JSONL=/caminho/para/batch_output.jsonl \
  #       docker compose run --rm article-evaluate
  #     Executa: compilação, Surefire, JaCoCo (line+branch), PIT mutation score.
  #     Saída em ./generated/results/article-eval/
  #
  # Variáveis configuráveis:
  #   RESPONSES_JSONL   : (obrigatório) arquivo JSONL de respostas do batch
  #   ERRORS_JSONL      : (opcional) arquivo JSONL de erros do batch
  #   RUN_STAMP         : timestamp da rodada (default: auto)
  #   GENERATION_MODEL  : chave do modelo no runtime.json (default: openai_main)
  #   SKIP_MAVEN_WARMUP : "sim" para pular pré-aquecimento na etapa de setup
  #   FORCE_RECLONE     : "sim" para forçar re-clone dos projetos
  #   JODA_TIME_COMMIT  : ref do joda-time (default: v2.12.7)
  #   LOG4J2_COMMIT     : ref do log4j2    (default: rel/2.23.1)

  article-setup:
    build:
      context: docker/article-evaluator
      dockerfile: Dockerfile
      args:
        WITUP_REPO:   ${WITUP_REPO:-https://github.com/marcelomamorim/witup-llm}
        WITUP_COMMIT: ${WITUP_COMMIT:-main}
    image: witup-llm/article-evaluator:latest
    environment:
      SKIP_MAVEN_WARMUP: ${SKIP_MAVEN_WARMUP:-nao}
      FORCE_RECLONE:     ${FORCE_RECLONE:-nao}
      JODA_TIME_COMMIT:  ${JODA_TIME_COMMIT:-v2.12.7}
      LOG4J2_COMMIT:     ${LOG4J2_COMMIT:-rel/2.23.1}
    volumes:
      - ./generated:/data/generated
    working_dir: /data
    command: bash /data/scripts/run-article-setup-docker.sh

  # ── article-pit: compila individualmente, poda falhos, roda JaCoCo + PIT ────
  # Requer article-setup e article-evaluate já executados.
  # Uso: docker compose run --rm article-pit
  article-pit:
    image: witup-llm/article-evaluator:latest
    volumes:
      - ./generated:/data/generated
    working_dir: /data
    command: bash /data/scripts/run-article-pit-docker.sh

  article-evaluate:
    image: witup-llm/article-evaluator:latest
    environment:
      RESPONSES_JSONL:  ${RESPONSES_JSONL:-}
      ERRORS_JSONL:     ${ERRORS_JSONL:-}
      RUN_STAMP:        ${RUN_STAMP:-}
      GENERATION_MODEL: ${GENERATION_MODEL:-openai_main}
    volumes:
      - ./generated:/data/generated
      # Montar o JSONL de respostas diretamente se estiver fora de ./generated/
      # Ex: RESPONSES_JSONL=/data/batch.jsonl e montar o diretório pai:
      - ${BATCH_DIR:-./generated}:/data/batch-input:ro
    working_dir: /data
    command: bash /data/scripts/run-article-evaluate-docker.sh
