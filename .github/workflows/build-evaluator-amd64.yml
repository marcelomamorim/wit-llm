name: Build evaluator (amd64) → Docker Hub

# Disparo manual via GitHub Actions → "Run workflow"
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag da imagem no Docker Hub'
        required: false
        default: 'amd64'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h — build do JDK do zero leva ~40min no Actions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        # O build precisa de ~20GB; runners têm 14GB livres por padrão.
        # Remove pacotes desnecessários para liberar espaço.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build jdk-builder (amd64)
        run: |
          docker build \
            --platform linux/amd64 \
            -t witup-llm/jdk-builder:latest \
            -f docker/jdk-builder/Dockerfile \
            .

      - name: Build evaluator (amd64) e push
        run: |
          TAG="${{ github.event.inputs.tag || 'amd64' }}"
          docker build \
            --platform linux/amd64 \
            -t cloudarchlab/witup-evaluator:${TAG} \
            -t cloudarchlab/witup-evaluator:latest-amd64 \
            -f docker/evaluator/Dockerfile \
            .
          docker push cloudarchlab/witup-evaluator:${TAG}
          docker push cloudarchlab/witup-evaluator:latest-amd64
